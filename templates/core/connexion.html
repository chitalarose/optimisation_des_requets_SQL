{% extends 'base.html' %}

{% block title %}Connexion - SQL Optimizer{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Connexion</h2>
        <p>Accédez à vos cours et suivez votre progression.</p>
        
        <form method="POST" action="">
            {% csrf_token %}
            <div class="form-group">
                {{ form.as_p }}
            </div>
            <button type="submit" class="btn-auth-submit">Se connecter</button>
        </form>
        
        <p class="auth-switch">Pas encore de compte ? <a href="/auth/inscription/">Inscrivez-vous ici</a></p>
    </div>
</div>
{% endblock %}
